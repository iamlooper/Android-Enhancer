name: Build Module

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout    
        uses: actions/checkout@v4
                                   
      - name: Upload module as artifact
        uses: actions/upload-artifact@v3
        with:
          name: module
          path: |
            .
            !.git
            !.github